name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        env:
          LAB_RATE_LIMIT_RPM: "0"
        run: |
          uv run python -m pytest \
            tests/test_core.py \
            tests/test_v2_pipeline.py \
            tests/test_bbeh_loader.py \
            tests/test_lab_api.py \
            tests/test_metrics.py \
            tests/test_analytics.py \
            tests/test_results_api.py \
            tests/test_judge_v2.py \
            tests/test_executor.py \
            tests/test_benchmarks_api.py \
            tests/test_rotation.py \
            tests/test_rate_limit_and_errors.py \
            -v --tb=short

  frontend-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit

      - name: Build
        working-directory: web
        run: npm run build
